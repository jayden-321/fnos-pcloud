services:
  pcloud-nas-sync:
    build:
      context: ./pcloud-sync
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-docker.m.daocloud.io/library/node:22-alpine}
    restart: unless-stopped
    environment:
      DATA_DIR: /data
      RESTIC_RESTORE_ROOT: /restore
      LOCAL_FOLDER_ROOTS: /sources
      PORT: 8080
      NODE_ENV: production
    # fnOS launches iframe apps through the NAS LAN address and this published
    # port. The default must therefore be reachable from the LAN; set
    # TRIM_SERVICE_BIND=127.0.0.1 only for deployments with a separate host-local
    # reverse proxy in front of the app.
    ports:
      - "${TRIM_SERVICE_BIND:-0.0.0.0}:${TRIM_SERVICE_PORT:-17880}:8080"
    volumes:
      - "${TRIM_PKGVAR:-./data}:/data"
      # 小皓OS会根据安装计划生成实际挂载。直接安装 FPK 时，只允许显式配置的
      # 单个来源根和恢复目录，不能默认暴露整个 /vol1 或 /vol2。
      - "${PCLOUD_SOURCE_DIR:-${TRIM_PKGHOME:-./data}/sources}:/sources:ro"
      - "${RESTIC_RESTORE_DIR:-${TRIM_PKGHOME:-./data}/restore}:/restore"
