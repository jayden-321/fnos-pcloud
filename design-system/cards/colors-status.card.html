<!-- @dsCard group="Colors" viewport="700x150" name="Status colors" subtitle="Success, failed, queued, advisory" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-ui); color: var(--text); background: var(--panel); }
  .row { display: flex; gap: 14px; padding: 20px; flex-wrap: wrap; }
  .sw { width: 130px; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--line); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; }
  .name { font-size: 12px; font-weight: 700; margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--green)">Success</div><div class="name">Success</div><div class="hex">#2f9a4b</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)">Failed</div><div class="name">Danger</div><div class="hex">#b7322c</div></div>
    <div class="sw"><div class="chip" style="background:var(--accent)">Uploading</div><div class="name">Uploading</div><div class="hex">#2775df</div></div>
    <div class="sw"><div class="chip" style="background:var(--queued)">Queued</div><div class="name">Queued</div><div class="hex">#718096</div></div>
  </div>
</body>
</html>
