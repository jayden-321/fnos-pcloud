<!-- @dsCard group="Type" viewport="700x180" name="Type scale" subtitle="System UI stack, 12 → 26px" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-ui); color: var(--text); background: var(--panel); padding: 18px 22px; }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 5px 0; }
  .tag { width: 88px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); flex: none; }
  .metric { font-size: 26px; font-weight: 760; }
  .h2 { font-size: 24px; }
  .card { font-size: 20px; font-weight: 700; }
  .nav { font-size: 16px; }
  .body { font-size: 14px; }
  .small { font-size: 13px; color: var(--muted); }
  .cap { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
  <div class="line"><span class="tag">26 / 760</span><span class="metric">1,284</span></div>
  <div class="line"><span class="tag">24 / 400</span><span class="h2">Sync Tasks Sync tasks</span></div>
  <div class="line"><span class="tag">20 / 700</span><span class="card">Finance backup Finance backup</span></div>
  <div class="line"><span class="tag">16 / 400</span><span class="nav">Settings Settings</span></div>
  <div class="line"><span class="tag">14 / 400</span><span class="body">One-way upload from NAS to pCloud.</span></div>
  <div class="line"><span class="tag">13 / 400</span><span class="small">Existing 18 · Pending upload 4</span></div>
  <div class="line"><span class="tag">12 / 500</span><span class="cap">Full verification is off by default.</span></div>
</body>
</html>
