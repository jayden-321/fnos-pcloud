<!-- @dsCard group="Type" viewport="700x150" name="Font families" subtitle="Native UI stack + monospace" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-ui); color: var(--text); background: var(--panel); padding: 22px; }
  .block { margin-bottom: 16px; }
  .lab { font-size: 11px; font-family: var(--font-mono); color: var(--muted); margin-bottom: 6px; }
  .ui { font-family: var(--font-ui); font-size: 19px; }
  .mono { font-family: var(--font-mono); font-size: 17px; }
  .stk { font-size: 11px; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="block">
    <div class="lab">--font-ui</div>
    <div class="ui">同步进度 Upload 1.2 MB/s · 已成功 248</div>
    <div class="stk">-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif</div>
  </div>
  <div class="block">
    <div class="lab">--font-mono</div>
    <div class="mono">/vol1/1000/photos → /Sync/Psync</div>
    <div class="stk">ui-monospace, SFMono-Regular, Menlo, Consolas, …</div>
  </div>
</body>
</html>
