<!-- @dsCard group="Brand" viewport="700x190" name="App mark" subtitle="pCloud NAS Sync icon & wordmark" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-ui); color: var(--text); background: var(--panel); padding: 24px; }
  .row { display: flex; align-items: center; gap: 26px; }
  img { width: 96px; height: 96px; border-radius: 22%; display: block; }
  .title { font-size: 22px; font-weight: 700; }
  .sub { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .meta { font-size: 12px; font-family: var(--font-mono); color: var(--muted); margin-top: 12px; }
  .dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; vertical-align: middle; margin: 0 4px 2px 0; }
</style>
</head>
<body>
  <div class="row">
    <img src="../assets/app-icon-256.png" alt="pCloud NAS Sync app icon">
    <div>
      <div class="title">pCloud NAS Sync</div>
      <div class="sub">fnOS · 一键备份 NAS 文件夹到 pCloud</div>
      <div class="meta"><span class="dot" style="background:var(--brand-green)"></span>#1d6f5f tile &nbsp; <span class="dot" style="background:var(--brand-yellow)"></span>#f2c14e arrow</div>
    </div>
  </div>
</body>
</html>
