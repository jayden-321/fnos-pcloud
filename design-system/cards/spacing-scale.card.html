<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="4 → 32px rhythm" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-ui); color: var(--text); background: var(--panel); padding: 20px; }
  .row { display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--accent); border-radius: 3px; width: 28px; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div></div>
    <div class="item"><div class="bar" style="height:6px"></div><div class="v">6</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div></div>
    <div class="item"><div class="bar" style="height:10px"></div><div class="v">10</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="v">12</div></div>
    <div class="item"><div class="bar" style="height:14px"></div><div class="v">14</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div></div>
    <div class="item"><div class="bar" style="height:18px"></div><div class="v">18</div></div>
    <div class="item"><div class="bar" style="height:22px"></div><div class="v">22</div></div>
    <div class="item"><div class="bar" style="height:28px"></div><div class="v">28</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div></div>
  </div>
</body>
</html>
