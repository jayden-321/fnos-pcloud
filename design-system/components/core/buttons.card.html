<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-ui); color: var(--text); background: var(--panel); padding: 22px; }
  .grp { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .lab { width: 84px; font-size: 11px; font-family: var(--font-mono); color: var(--muted); flex: none; }

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { Button, StatusPill, NavItem } = window.PCloudNASSyncDesignSystem_4c073a;
  function Demo() {
    return (
      <div>
        <div className="grp"><span className="lab">primary</span>
          <Button>立即扫描</Button>
          <Button variant="primary" disabled>停止同步</Button>
        </div>
        <div className="grp"><span className="lab">soft</span>
          <Button variant="soft">查看日志</Button>
          <Button variant="soft">编辑</Button>
          <Button variant="link">＋ 创建新任务</Button>
        </div>
        <div className="grp"><span className="lab">nav</span>
          <div style={{width:150}}><NavItem active>同步任务</NavItem></div>
          <div style={{width:150}}><NavItem>设置</NavItem></div>
        </div>
        <div className="grp"><span className="lab">status</span>
          <StatusPill status="success" />
          <StatusPill status="failed" />
          <StatusPill status="uploading" />
          <StatusPill status="queued">待上传</StatusPill>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>

</html>
