<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-ui); color: var(--text); background: var(--panel); padding: 22px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 18px; }

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>

<script src="../../_ds_bundle.js"></script>
<script type="text/babel" data-presets="react">
  const { Field, Input, Select, MetricCard } = window.PCloudNASSyncDesignSystem_4c073a;
  function Demo() {
    return (
      <div>
        <div className="cols">
          <Field label="Task name"><Input placeholder="e.g. Finance backup" /></Field>
          <Field label="Post-upload verification" note="Verification calls pCloud checksumfile.">
            <Select><option>Off</option><option>Verify failed uploads</option><option>Verify all uploads</option></Select>
          </Field>
        </div>
        <div className="metrics">
          <MetricCard value="1,284" label="Total files" />
          <MetricCard value="248" label="Uploaded" tone="success" />
          <MetricCard value="3" label="Failed" tone="danger" />
          <MetricCard value="1.2 MB/s" label="Upload speed" tone="accent" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
